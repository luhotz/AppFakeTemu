<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación Tech | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        

        .bg-green-brand { background-color: #064e3b; } 
        .text-green-brand { color: #064e3b; }
        .hover-green-brand:hover { background-color: #065f46; } 
        .border-green-brand { border-color: #064e3b; }
        
        .transition-fast { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .modal-scale { transform: scale(0.95); opacity: 0; transition: all 0.2s ease-out; }
        .modal-active .modal-scale { transform: scale(1); opacity: 1; }

        .hero-search { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at top, #fff 0%, #f0fdf4 100%); 
        }
    </style>
</head>
<body>

    <section id="search-screen" class="hero-search px-6 py-12">
        <div class="max-w-4xl w-full text-center fade-in">
            <h1 class="text-5xl md:text-8xl font-black text-gray-900 mb-6 tracking-tighter leading-none">
                BUSCA TU <span class="text-green-brand">OFERTA</span>
            </h1>
            <p class="text-lg md:text-xl text-gray-400 mb-10">Stock limitado por cierre de aduana.</p>
            
            <div class="relative max-w-2xl mx-auto shadow-2xl rounded-3xl overflow-hidden border-4 border-green-brand bg-white">
                <div class="flex flex-col md:flex-row">
                    <input type="text" id="main-input" placeholder="¿Qué deseas comprar?" 
                        class="w-full px-6 py-5 md:py-7 text-xl md:text-2xl border-none focus:ring-0 outline-none"
                        onkeyup="checkSearch(event)">
                    <button onclick="revealCatalog()" class="w-full md:w-auto md:absolute md:right-2 md:top-2 md:bottom-2 px-10 py-4 md:py-0 bg-green-brand text-white font-black rounded-xl md:rounded-2xl hover-green-brand transition-fast text-lg uppercase">
                        Buscar
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="catalog-screen" class="hidden">
        <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between">
                <div class="text-xl font-black text-green-brand tracking-tighter uppercase italic"> <span class="text-gray-900 underline"> </span></div>
                <div class="flex items-center space-x-3">
                    <span class="text-[10px] font-bold text-red-600 animate-pulse uppercase">Flash Sale</span>
                    <div class="h-8 w-8 bg-green-50 rounded-full flex items-center justify-center text-green-brand font-bold">🛒</div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12 fade-in">
            <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"></div>
            <div class="mt-16 py-10 text-center text-gray-300 font-bold uppercase tracking-widest border-t border-gray-100 text-xs">Fin del catálogo</div>
        </main>
    </section>

    <div id="productModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm transition-fast">
        <div class="modal-scale bg-white rounded-[2rem] md:rounded-[2.5rem] max-w-4xl w-full max-h-[95vh] overflow-hidden flex flex-col md:flex-row shadow-2xl">
            <div class="h-64 md:h-auto md:w-1/2 bg-white flex items-center justify-center p-6">
                <img id="modalImg" src="" class="max-w-full max-h-full object-contain">
            </div>
            <div class="flex-1 p-6 md:p-12 relative overflow-y-auto bg-white border-l border-gray-50">
                <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 text-3xl">&times;</button>
                
                <div id="ratings-container" class="mb-4 hidden space-y-2">
                    <div class="flex items-center space-x-2">
                        <div class="flex text-yellow-500 text-sm">★★★★★</div>
                        <span id="product-revs" class="text-xs text-gray-400 font-bold"></span>
                    </div>
                    <div id="seller-rating" class="hidden flex items-center space-x-2 bg-gray-50 p-2 rounded-lg border border-gray-100 w-fit">
                        <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">Vendedor</span>
                        <div class="flex text-emerald-600 text-[10px]">★★★★★</div>
                        <span class="text-[10px] text-gray-600 font-bold">4.5 (3k+ reseñas)</span>
                    </div>
                </div>

                <h2 id="modalTitle" class="text-2xl md:text-3xl font-black text-gray-900 mb-2 leading-tight"></h2>
                <p id="modalPrice" class="text-4xl md:text-5xl font-black text-green-brand mb-4"></p>
                <div id="modalDesc" class="text-gray-500 text-sm mb-6 leading-relaxed"></div>
                
                <div class="bg-green-50 text-green-800 p-4 rounded-2xl text-xs font-bold mb-6 italic">
                    ⚡ Oferta de liquidación por cierre de sucursal.
                </div>
                
                <button onclick="showConfirm()" class="w-full bg-green-brand text-white font-black py-4 rounded-2xl hover-green-brand transition-fast shadow-xl shadow-green-100 text-lg uppercase">
                    Comprar ahora
                </button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 bg-black/60 hidden z-[70] flex items-center justify-center p-4 backdrop-blur-sm transition-fast">
        <div class="modal-scale bg-white rounded-3xl p-8 max-w-sm w-full text-center">
            <h3 class="text-xl font-bold mb-4 uppercase">¿Confirmar pedido?</h3>
            <p class="text-gray-500 mb-8 text-sm">Esta acción procesará su pago de forma segura y permanente.</p>
            <div class="flex space-x-4">
                <button onclick="closeConfirm()" class="flex-1 py-4 bg-gray-100 rounded-2xl font-bold text-gray-400 uppercase text-xs">Cancelar</button>
                <button onclick="processFinalBuy()" class="flex-1 py-4 bg-green-brand text-white rounded-2xl font-bold uppercase text-xs">Sí, comprar</button>
            </div>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-black/60 hidden z-[80] flex items-center justify-center p-4 backdrop-blur-sm transition-fast">
        <div class="modal-scale bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl animate-bounce">✓</div>
            <h3 class="text-2xl font-black mb-2 uppercase">PAGO RECIBIDO</h3>
            <p class="text-gray-400 italic text-sm">Actualizando catálogo...</p>
        </div>
    </div>

    <script>
const products = [  
            { id: 1, name: ' ', price: '$499.00', url: 'img/34732.jpg' },
            { id: 2, name: ' ', price: '$420.00', url: 'img/34733.jpg' },
            { id: 3, name: ' ', price: '$350.00', url: 'img/34738.jpg' },
            { id: 4, name: ' ', price: '$280.00', url: 'img/43676.jpg' },
            { id: 5, name: ' ', price: '$390.00', url: 'img/1359611_181105-OX1G0W-608.jpg' },
            { id: 6, name: ' ', price: '$250.00', url: 'img/3425273_59975.jpg' },
            { id: 7, name: ' ', price: '$650.00', url: 'img/10172882.png' },
            { id: 8, name: ' ', price: '$480.00', url: 'img/95230902_Smart Phone Flat Style.jpg' },
            { id: 12, name: ' ', price: '$285.00', url: 'img/IMG-20260424-WA0028.jpg' },
            { id: 13, name: ' ', price: '$240.00', url: 'img/smartphone_cartoon.jpg', 
              desc: 'Pantalla pOLED Curva de 144Hz, Procesador Octa-Core de 2.5GHz, 8GB RAM + 256GB Almacenamiento. Cámara Triple de 50MP con OIS y Carga Rápida de 68W TurboPower. Resistente al agua IP68.',
              special: true },
            { id: 18, name: ' ', price: '$275.00', url: 'img/43676.jpg' },
            { id: 21, name: ' ', price: '$320.00', url: 'img/34733.jpg' },
            { id: 22, name: 'Apex Lazer 808  Ultra 1TB', price: '$17.99', url: 'img/10172882.png' },
            { id: 23, name: ' ', price: '$300.00', url: 'img/43676.jpg' },
            { id: 24, name: ' ', price: '$315.00', url: 'img/95230902_Smart Phone Flat Style.jpg' }
        ];

        function checkSearch(e) { if (e.key === 'Enter') revealCatalog(); }

        function revealCatalog() {
            document.getElementById('search-screen').classList.add('hidden');
            document.getElementById('catalog-screen').classList.remove('hidden');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            products.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-100 rounded-[2rem] overflow-hidden hover:shadow-xl transition-fast cursor-pointer group fade-in";
                card.style.animationDelay = `${index * 0.05}s`;
                
                if(p.id === 22) card.className += " border-2 border-green-500 ring-4 ring-green-50";
                
                card.onclick = () => openModal(p);
                card.innerHTML = `
                    <div class="h-56 bg-white overflow-hidden relative p-6 flex items-center justify-center">
                        <img src="${p.url}" class="max-w-full max-h-full object-contain group-hover:scale-105 transition-fast">
                        ${p.id === 22 ? '<span class="absolute top-3 left-3 bg-green-900 text-white text-[9px] font-black px-3 py-1 rounded-full animate-bounce uppercase">Oferta</span>' : ''}
                    </div>
                    <div class="p-5 border-t border-gray-50 text-center">
                        <h3 class="font-bold text-gray-900 mb-4 h-10 line-clamp-2 text-sm leading-tight">${p.name}</h3>
                        <div class="flex items-end justify-between">
                            <span class="text-xl font-black text-green-brand">${p.price}</span>
                            <div class="w-8 h-8 bg-gray-900 text-white rounded-lg flex items-center justify-center font-bold text-lg">+</div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function openModal(p) {
            const m = document.getElementById('productModal');
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = p.price;
            document.getElementById('modalImg').src = p.url;
            document.getElementById('modalDesc').innerText = p.desc || 'Edición limitada con acabado premium. Incluye garantía extendida por 12 meses directamente con el fabricante.';
            
            const ratingsContainer = document.getElementById('ratings-container');
            const sellerRating = document.getElementById('seller-rating');
            const revSpan = document.getElementById('product-revs');
            
            if(p.id === 13) {
                ratingsContainer.classList.remove('hidden');
                sellerRating.classList.remove('hidden');
                revSpan.innerText = "(1.1k+ calificaciones)";
            } else {
                ratingsContainer.classList.add('hidden');
                sellerRating.classList.add('hidden');
            }

            m.classList.remove('hidden');
            setTimeout(() => m.classList.add('modal-active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('productModal');
            m.classList.remove('modal-active');
            setTimeout(() => m.classList.add('hidden'), 200);
            document.body.style.overflow = 'auto';
        }

        function showConfirm() {
            const m = document.getElementById('confirmModal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.add('modal-active'), 10);
        }

        function closeConfirm() {
            const m = document.getElementById('confirmModal');
            m.classList.remove('modal-active');
            setTimeout(() => m.classList.add('hidden'), 200);
        }

        function processFinalBuy() {
            closeConfirm();
            const s = document.getElementById('successModal');
            s.classList.remove('hidden');
            setTimeout(() => s.classList.add('modal-active'), 10);
            setTimeout(() => {
                s.classList.remove('modal-active');
                setTimeout(() => {
                    s.classList.add('hidden');
                    const pm = document.getElementById('productModal');
                    pm.classList.remove('modal-active');
                    setTimeout(() => {
                        pm.classList.add('hidden');
                        document.body.style.overflow = 'auto';
                    }, 200);
                }, 200);
            }, 2000);
        }
    </script>
</body>
</html>
