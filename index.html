<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación Tech | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        
        .bg-green-brand { background-color: #052e16; } 
        .text-green-brand { color: #052e16; }
        .hover-green-brand:hover { background-color: #064e3b; } 
        .border-green-brand { border-color: #052e16; }
        
        .transition-fast { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- CONTENEDOR DE PRECIO DINÁMICO --- */
        .fire-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            z-index: 10;
            /* El contenedor ahora flota armónicamente */
            animation: floating-price 3s ease-in-out infinite;
        }

        @keyframes floating-price {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(1deg); }
        }

        .fire-canvas {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -45%); /* Fuego centrado tras el texto */
            width: 200%; 
            height: 280%; 
            z-index: -1; 
            pointer-events: none; 
            filter: blur(1px) contrast(1.1);
        }

        .fire-text {
            color: #052e16; 
            font-weight: 900;
            z-index: 10;
            position: relative;
            animation: text-shiver 0.15s infinite alternate;
        }

        @keyframes text-shiver {
            from { transform: translateX(-0.5px) scale(1); filter: brightness(1); }
            to { transform: translateX(0.5px) scale(1.05); filter: brightness(1.3); }
        }

        .extreme-heat {
            animation: war-vibration 0.4s infinite linear;
            box-shadow: 0 0 35px rgba(36, 212, 59, 0.4) !important;
        }

        @keyframes war-vibration {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(0.3deg); }
            75% { transform: rotate(-0.3deg); }
            100% { transform: rotate(0deg); }
        }

        .modal-scale { transform: scale(0.95); opacity: 0; transition: all 0.2s ease-out; }
        .modal-active .modal-scale { transform: scale(1); opacity: 1; }

        .hero-search { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at top, #fff 0%, #f0fdf4 100%); 
        }
    </style>
</head>
<body>

    <section id="search-screen" class="hero-search px-6 py-12">
        <div class="max-w-4xl w-full text-center fade-in">
            <h1 class="text-5xl md:text-8xl font-black text-gray-900 mb-6 tracking-tighter leading-none">
                BUSCA TU <span class="text-green-brand">OFERTA</span>
            </h1>
            <p class="text-lg md:text-xl text-gray-400 mb-10">Stock limitado por cierre de aduana.</p>
            
            <div class="relative max-w-2xl mx-auto shadow-2xl rounded-3xl overflow-hidden border-4 border-green-brand bg-white">
                <div class="flex flex-col md:flex-row">
                    <input type="text" id="main-input" placeholder="¿Qué deseas comprar?" 
                        class="w-full px-6 py-5 md:py-7 text-xl md:text-2xl border-none focus:ring-0 outline-none"
                        onkeyup="checkSearch(event)">
                    <button onclick="revealCatalog()" class="w-full md:w-auto md:absolute md:right-2 md:top-2 md:bottom-2 px-10 py-4 md:py-0 bg-green-brand text-white font-black rounded-xl md:rounded-2xl hover-green-brand transition-fast text-lg uppercase">
                        Buscar
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="catalog-screen" class="hidden">
        <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between">
                <div class="text-xl font-black text-green-brand tracking-tighter uppercase italic underline"> </div>
                <div class="flex items-center space-x-3">
                    <span class="text-[10px] font-bold text-red-600 animate-pulse uppercase">Flash Sale</span>
                    <div class="h-8 w-8 bg-green-50 rounded-full flex items-center justify-center text-green-brand font-bold">🛒</div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12 fade-in">
            <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"></div>
        </main>
    </section>

    <div id="productModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm transition-fast">
        <div class="modal-scale bg-white rounded-[2rem] md:rounded-[2.5rem] max-w-4xl w-full max-h-[95vh] overflow-hidden flex flex-col md:flex-row shadow-2xl">
            <div class="h-64 md:h-auto md:w-1/2 bg-white flex items-center justify-center p-6">
                <img id="modalImg" src="" class="max-w-full max-h-full object-contain">
            </div>
            <div class="flex-1 p-6 md:p-12 relative overflow-y-auto bg-white border-l border-gray-50 text-center md:text-left">
                <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 text-3xl">&times;</button>
                <h2 id="modalTitle" class="text-3xl md:text-5xl font-black text-gray-900 mb-4 leading-tight"></h2>
                
                <div id="modalPriceContainer" class="mb-10 h-32 flex items-center justify-center"></div>
                
                <div id="modalDesc" class="text-gray-500 text-sm mb-6 leading-relaxed"></div>
                <button onclick="closeModal()" class="w-full bg-green-brand text-white font-black py-4 rounded-2xl hover-green-brand transition-fast text-lg uppercase">
                    Comprar ahora
                </button>
            </div>
        </div>
    </div>

    <script>
        const products = [  
            { id: 1, name: ' ', price: '$499.00', url: 'img/34732.jpg' },
            { id: 2, name: ' ', price: '$420.00', url: 'img/34733.jpg' },
            { id: 3, name: ' ', price: '$350.00', url: 'img/34738.jpg' },
            { id: 4, name: ' ', price: '$280.00', url: 'img/43676.jpg' },
            { id: 5, name: ' ', price: '$390.00', url: 'img/1359611_181105-OX1G0W-608.jpg' },
            { id: 6, name: ' ', price: '$250.00', url: 'img/3425273_59975.jpg' },
            { id: 7, name: ' ', price: '$650.00', url: 'img/10172882.png' },
            { id: 8, name: ' ', price: '$480.00', url: 'img/95230902_Smart Phone Flat Style.jpg' },
            { id: 12, name: ' ', price: '$285.00', url: 'img/IMG-20260424-WA0028.jpg' },
            { id: 13, name: ' ', price: '$240.00', url: 'img/smartphone_cartoon.jpg', 
              desc: 'Pantalla pOLED Curva de 144Hz, Procesador Octa-Core de 2.5GHz, 8GB RAM + 256GB Almacenamiento. Cámara Triple de 50MP con OIS y Carga Rápida de 68W TurboPower. Resistente al agua IP68.',
              special: true },
            { id: 18, name: ' ', price: '$275.00', url: 'img/43676.jpg' },
            { id: 21, name: ' ', price: '$320.00', url: 'img/34733.jpg' },
            { id: 22, name: 'Telefono nuevo', price: '$17.99', url: 'img/10172882.png' },
            { id: 23, name: ' ', price: '$300.00', url: 'img/43676.jpg' },
            { id: 24, name: ' ', price: '$315.00', url: 'img/95230902_Smart Phone Flat Style.jpg' }
        ];

        function checkSearch(e) { if (e.key === 'Enter') revealCatalog(); }

        function revealCatalog() {
            document.getElementById('search-screen').classList.add('hidden');
            document.getElementById('catalog-screen').classList.remove('hidden');
            renderGrid();
        }

        class FireEngine {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                if (!this.canvas) return;
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.w = this.canvas.width = this.canvas.offsetWidth;
                this.h = this.canvas.height = this.canvas.offsetHeight;
            }

            createParticle() {
                const x = this.w * 0.5 + (Math.random() - 0.5) * (this.w * 0.5);
                const y = this.h * 0.52; // Nace justo tras el texto
                this.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * -4 - 2,
                    life: Math.random() * 20 + 15,
                    size: Math.random() * 14 + 7,
                    color: Math.random() > 0.15 ? 
                        `rgba(${255}, ${Math.floor(Math.random() * 120 + 60)}, 0, ` : 
                        `rgba(60, 60, 60, ` 
                });
            }

            update() {
                this.ctx.clearRect(0, 0, this.w, this.h);
                for(let i = 0; i < 8; i++) this.createParticle();

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    p.size *= 0.89; 
                    const opacity = p.life / 25;

                    if (p.life <= 0 || p.size < 1) {
                        this.particles.splice(i, 1);
                    } else {
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fillStyle = p.color + opacity + ')';
                        this.ctx.fill();
                    }
                }
                requestAnimationFrame(() => this.update());
            }
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            products.forEach((p) => {
                const card = document.createElement('div');
                const isSpecial = p.id === 22;
                
                card.className = "bg-white border border-gray-100 rounded-[2rem] overflow-hidden hover:shadow-xl transition-fast cursor-pointer group fade-in";
                if(isSpecial) card.className += " border-2 border-green-900 extreme-heat ring-8 ring-green-50";

                let priceHTML = `<span class="text-xl font-black text-green-brand">${p.price}</span>`;
                
                if(isSpecial) {
                    priceHTML = `
                        <div class="fire-container scale-[1.6]">
                            <canvas id="fireGrid_${p.id}" class="fire-canvas"></canvas>
                            <span class="fire-text text-3xl">${p.price}</span>
                        </div>`;
                }

                card.onclick = () => openModal(p);
                card.innerHTML = `
                    <div class="h-56 bg-white overflow-hidden relative p-6 flex items-center justify-center">
                        <img src="${p.url}" class="max-w-full max-h-full object-contain group-hover:scale-105 transition-fast">
                        ${isSpecial ? '<span class="absolute top-3 left-3 bg-red-600 text-white text-[9px] font-black px-3 py-1 rounded-full animate-bounce uppercase z-10">OFERTA</span>' : ''}
                    </div>
                    <div class="p-5 border-t border-gray-50 text-center">
                        <h3 class="font-black text-gray-900 mb-4 line-clamp-2 leading-tight ${isSpecial ? 'text-2xl h-auto' : 'text-sm h-10'}">
                            ${p.name}
                        </h3>
                        <div class="flex items-center justify-between relative h-14">
                            ${priceHTML}
                            <div class="w-8 h-8 bg-gray-900 text-white rounded-lg flex items-center justify-center font-bold text-lg z-10">+</div>
                        </div>
                    </div>`;
                grid.appendChild(card);
                
                if(isSpecial) {
                    setTimeout(() => {
                        const engine = new FireEngine(`fireGrid_${p.id}`);
                        engine.update();
                    }, 50);
                }
            });
        }

        function openModal(p) {
            const m = document.getElementById('productModal');
            const isSpecial = p.id === 22;
            
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalTitle').className = `font-black text-gray-900 mb-4 leading-tight ${isSpecial ? 'text-5xl' : 'text-3xl'}`;
            document.getElementById('modalImg').src = p.url;
            document.getElementById('modalDesc').innerText = p.desc || 'Stock limitado por liquidación de aduana. Precio final garantizado.';
            
            const priceContainer = document.getElementById('modalPriceContainer');
            if(isSpecial) {
                priceContainer.innerHTML = `
                    <div class="fire-container scale-[3.2]">
                        <canvas id="fireModal_${p.id}" class="fire-canvas"></canvas>
                        <span class="fire-text text-5xl">${p.price}</span>
                    </div>`;
                
                setTimeout(() => {
                    const engine = new FireEngine(`fireModal_${p.id}`);
                    engine.update();
                }, 100);
            } else {
                priceContainer.innerHTML = `<span class="text-4xl font-black text-green-brand">${p.price}</span>`;
            }

            m.classList.remove('hidden');
            setTimeout(() => m.classList.add('modal-active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('productModal');
            m.classList.remove('modal-active');
            setTimeout(() => m.classList.add('hidden'), 200);
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
